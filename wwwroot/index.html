<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>File Explorer</title>
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <div id="nav">
                <button id="back-btn" disabled>&#8592;</button>
                <div id="breadcrumbs"></div>
            </div>
            <div id="toolbar-actions">
                <label id="upload-btn">
                    Upload
                    <input type="file" id="upload-input">
                </label>
                <button type="button" id="logout-btn">Logout</button>
            </div>
        </header>
        <div id="upload-progress" class="hidden">
            <div id="upload-progress-bar"></div>
            <span id="upload-progress-label">Uploading...</span>
        </div>
        <div id="explorer-body">
            <aside id="directory-sidebar"></aside>
            <main id="files-container"></main>
        </div>
    </div>
    <div id="video-overlay">
        <video id="video-player" controls></video>
    </div>
    <div id="editor-overlay">
        <div id="editor-card">
            <div id="editor-header">
                <span id="editor-filename"></span>
                <div id="editor-actions">
                    <button id="editor-save-btn">Save</button>
                    <button id="editor-close-btn">Close</button>
                </div>
            </div>
            <textarea id="editor-textarea" spellcheck="false"></textarea>
        </div>
    </div>
    <div id="rename-overlay">
        <div id="rename-card">
            <label for="rename-input">Rename</label>
            <input type="text" id="rename-input">
            <div id="rename-actions">
                <button id="rename-confirm-btn">Rename</button>
                <button id="rename-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
