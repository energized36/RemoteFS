<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login — File Explorer</title>
</head>
<body id="login-page">
    <div id="login-card">
        <div id="login-header">
            <img src="/folder.svg" id="login-icon" alt="folder">
            <h1>File Explorer</h1>
        </div>
        <form id="login-form">
            <div class="field">
                <label for="user">Username</label>
                <input type="text" id="user" name="username" autocomplete="username" spellcheck="false">
            </div>
            <div class="field">
                <label for="pw">Password</label>
                <input type="password" id="pw" name="password" autocomplete="current-password">
            </div>
            <p id="login-error"></p>
            <button id="login-btn" type="button">Login</button>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
